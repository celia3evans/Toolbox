<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category — Toolbox</title>
  <link rel="stylesheet" href="/public/css/style.css" />
</head>
<body>

  <header class="site-header">
    <a class="logo" href="/">Toolbox</a>
    <div class="header-controls">
      <button class="lang-toggle" aria-label="Switch language" id="lang-toggle-btn">FR</button>
      <button class="hamburger" aria-label="Open menu" aria-expanded="false">&#9776;</button>
    </div>
  </header>

  <nav class="nav-menu" aria-hidden="true">
    <button class="nav-close" aria-label="Close menu">&times;</button>
    <ul>
      <li><a href="/"               data-i18n="nav.home">Home</a></li>
      <li><a href="/resources.html" data-i18n="nav.resources">All Resources</a></li>
      <li><a href="/saved.html"     data-i18n="nav.saved">Saved</a></li>
      <li><a href="/profile.html"   data-i18n="nav.profile">Profile</a></li>
      <li><a href="/about.html"     data-i18n="nav.about">About</a></li>
    </ul>
  </nav>
  <div class="nav-overlay" aria-hidden="true"></div>

  <main>
    <h1 id="category-heading"></h1>

    <div id="cat-error-state" hidden style="text-align: center;">
      <p id="cat-error-message"></p>
      <a href="/" id="cat-error-home-link" data-i18n="category.backHome">Back to Home</a>
    </div>

    <div class="controls-bar" id="search-bar-container" hidden>
      <input
        type="search"
        class="search-bar"
        id="search-input"
        data-i18n="category.search"
        placeholder="Search resources…"
        aria-label="Search resources"
      />
    </div>

    <p class="loading-indicator" id="loading-indicator" hidden>
      <span data-i18n="state.loading">Loading…</span>
    </p>
    <div id="error-state" hidden style="text-align: center;">
      <p class="error-message" id="error-message"></p>
      <button class="btn btn-ghost" id="retry-btn"></button>
    </div>
    <p class="empty-message" id="empty-state" hidden></p>
    <div id="resource-list" class="resource-grid"></div>
  </main>

  <script src="/public/js/config.js"></script>
  <script src="/public/js/translations.js"></script>
  <script src="/public/js/i18n.js"></script>
  <script src="/public/js/api.js"></script>
  <script src="/public/js/cards.js"></script>
  <script src="/public/js/nav.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      initLang();
      initNav();

      var langBtn = document.getElementById('lang-toggle-btn');
      langBtn.addEventListener('click', function () {
        var next = getLang() === 'en' ? 'fr' : 'en';
        setLang(next);
        langBtn.textContent = next === 'en' ? 'FR' : 'EN';
        if (allResources.length > 0) renderFiltered();
        if (!document.getElementById('cat-error-state').hidden) {
          document.getElementById('cat-error-message').textContent = getString('error.nocat');
        }
      });
      langBtn.textContent = getLang() === 'en' ? 'FR' : 'EN';

      var categoryHeading    = document.getElementById('category-heading');
      var catErrorState      = document.getElementById('cat-error-state');
      var catErrorMessage    = document.getElementById('cat-error-message');
      var searchBarContainer = document.getElementById('search-bar-container');
      var loadingIndicator   = document.getElementById('loading-indicator');
      var errorState         = document.getElementById('error-state');
      var errorMessage       = document.getElementById('error-message');
      var retryBtn           = document.getElementById('retry-btn');
      var emptyState         = document.getElementById('empty-state');
      var resourceList       = document.getElementById('resource-list');
      var searchInput        = document.getElementById('search-input');

      var allResources = [];
      var currentQuery = '';

      var cat = new URLSearchParams(location.search).get('cat');
      if (!cat) {
        catErrorMessage.textContent = getString('error.nocat');
        catErrorState.hidden = false;
        return;
      }

      categoryHeading.textContent = cat;
      document.title = cat + ' \u2014 Toolbox';
      searchBarContainer.hidden = false;

      function showLoading() {
        loadingIndicator.hidden = false;
        errorState.hidden = true;
        emptyState.hidden = true;
        resourceList.hidden = true;
      }
      function hideLoading() {
        loadingIndicator.hidden = true;
        resourceList.hidden = false;
      }
      function showError() {
        errorMessage.textContent = getString('error.load');
        retryBtn.textContent     = getString('error.retry');
        errorState.hidden = false;
        loadingIndicator.hidden = true;
        resourceList.hidden = true;
      }

      function renderFiltered() {
        var lang     = getLang();
        var filtered = applyFilters(allResources, { query: currentQuery, categories: new Set(), freeOnly: false }, lang);
        resourceList.innerHTML = '';
        if (filtered.length === 0) {
          emptyState.textContent = getString('state.noResults');
          emptyState.hidden = false;
        } else {
          emptyState.hidden = true;
          filtered.forEach(function (r) { resourceList.appendChild(renderCard(r, lang)); });
        }
      }

      searchInput.addEventListener('input', function () {
        currentQuery = this.value;
        renderFiltered();
      });
      retryBtn.addEventListener('click', function () { location.reload(); });

      showLoading();
      fetchResources({ category: cat })
        .then(function (resources) {
          allResources = resources;
          hideLoading();
          renderFiltered();
        })
        .catch(showError);
    });
  </script>

</body>
</html>
